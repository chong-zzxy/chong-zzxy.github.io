    <script>
      (function() {
        var statsRoot = document.getElementById('site-footer-stats');
        if (!statsRoot) return;

        var pvEl = document.getElementById('site_stats_pv');
        var uvEl = document.getElementById('site_stats_uv');
        var resetCarrier = statsRoot.querySelector('[data-stats-reset]');
        var resetKey = resetCarrier ? String(resetCarrier.getAttribute('data-stats-reset') || '').trim() : '';
        if (!resetKey) resetKey = '20260406';

        var pvKey = 'chong_site_pv_' + resetKey;
        var uvKey = 'chong_site_uv_' + resetKey;
        var sessionKey = 'chong_site_session_' + resetKey;

        function readCounter(key) {
          try {
            var raw = window.localStorage.getItem(key);
            var val = parseInt(raw || '0', 10);
            return Number.isFinite(val) && val > 0 ? val : 0;
          } catch (error) {
            return 0;
          }
        }

        function writeCounter(key, value) {
          try {
            window.localStorage.setItem(key, String(Math.max(0, value | 0)));
          } catch (error) {
          }
        }

        var pv = readCounter(pvKey) + 1;
        writeCounter(pvKey, pv);

        var uv = readCounter(uvKey);
        var isNewSession = false;
        try {
          if (!window.sessionStorage.getItem(sessionKey)) {
            window.sessionStorage.setItem(sessionKey, '1');
            isNewSession = true;
          }
        } catch (error) {
          isNewSession = true;
        }

        if (isNewSession) {
          uv += 1;
          writeCounter(uvKey, uv);
        }

        if (pvEl) pvEl.textContent = String(pv);
        if (uvEl) uvEl.textContent = String(uv);
      })();
    </script>
