      (function() {
        function syncBusuanziState() {
          var pvContainer = document.getElementById('busuanzi_container_site_pv');
          var uvContainer = document.getElementById('busuanzi_container_site_uv');
          var pvValue = document.getElementById('busuanzi_value_site_pv');
          var uvValue = document.getElementById('busuanzi_value_site_uv');
          var loading = document.getElementById('site-footer-stats-loading');

          var hasPv = pvValue && pvValue.textContent && pvValue.textContent.trim();
          var hasUv = uvValue && uvValue.textContent && uvValue.textContent.trim();

          if (pvContainer) pvContainer.style.display = hasPv ? 'inline-flex' : 'none';
          if (uvContainer) uvContainer.style.display = hasUv ? 'inline-flex' : 'none';

          if (loading && (hasPv || hasUv)) {
            loading.style.display = 'none';
          }
        }

        window.addEventListener('load', function() {
          setTimeout(syncBusuanziState, 900);
          setTimeout(syncBusuanziState, 2200);
          setTimeout(function() {
            var loading = document.getElementById('site-footer-stats-loading');
            if (loading && loading.style.display !== 'none') {
              loading.textContent = '访问统计暂不可用';

          }, 4200);
        });
